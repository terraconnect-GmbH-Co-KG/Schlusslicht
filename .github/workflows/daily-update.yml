name: Tägliche Aktualisierung – schlusslicht.de

on:
  schedule:
    - cron: '10 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install --quiet requests beautifulsoup4

      # Versuche ALLE Seiten mit API zu aktualisieren (DE + EN je einmal)
      - name: Mit API aktualisieren (wenn verfügbar)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python rebuild/generate.py 2>&1 || true
          SL_LANG=en python rebuild/generate.py 2>&1 || true
          python rebuild/generate_visionen.py 2>&1 || true
          SL_LANG=en python rebuild/generate_visionen.py 2>&1 || true
          python rebuild/generate_mfb.py 2>&1 || true
          SL_LANG=en python rebuild/generate_mfb.py 2>&1 || true
          python rebuild/generate_ncf.py 2>&1 || true
          SL_LANG=en python rebuild/generate_ncf.py 2>&1 || true
        continue-on-error: true

      # FALLBACK: Nur für Dateien, die die Hauptgenerierung NICHT bereits
      # aktualisiert hat (git diff leer = unverändert). Ohne diese Prüfung
      # würde fallback_update.py auch frisch generierte Seiten nochmal
      # anfassen und das #update-time-Feld redundant/inkonsistent
      # überschreiben (gleiche Stelle wird von generate.py UND
      # fallback_update.py beschrieben).
      - name: Fallback — Aktualisiere Datum (nur für unveränderte Dateien)
        shell: bash
        run: |
          declare -A LANG_FOR
          LANG_FOR[index.html]=de
          LANG_FOR[index.en.html]=en
          LANG_FOR[brightside.html]=de
          LANG_FOR[brightside.en.html]=en
          LANG_FOR[insights.html]=de
          LANG_FOR[insights.en.html]=en
          LANG_FOR[nonconformist.html]=de
          LANG_FOR[nonconformist.en.html]=en

          for file in "${!LANG_FOR[@]}"; do
            if git diff --quiet -- "$file"; then
              echo "$file: unveraendert durch Hauptgenerierung -> Fallback-Datum"
              python rebuild/fallback_update.py "$file" "${LANG_FOR[$file]}" || true
            else
              echo "$file: bereits von Hauptgenerierung aktualisiert -> Fallback wird NICHT angewendet"
            fi
          done
        continue-on-error: true

      # Commit und Push — HTML-Seiten UND die Story-Historie
      # (story_history.json MUSS committet werden, sonst geht die
      # Wiederholungssperre bei jedem Lauf verloren, weil GitHub-Actions-
      # Runner ephemeral sind und nur der committete Repo-Stand bleibt)
      - name: Commit und Push
        run: |
          git config user.name "schlusslicht-bot"
          git config user.email "burkhard.frie@terraconnect.de"
          git add *.html rebuild/story_history.json rebuild/essay_history.json rebuild/essay_history_en.json 2>/dev/null || true
          git diff --staged --quiet || (
            git commit -m "Tagesausgabe $(date -u +'%d.%m.%Y')"
            git push
          )
        continue-on-error: true
